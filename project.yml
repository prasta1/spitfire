name: Spitfire
configs:
  Debug: debug
  Release: release
options:
  groupSortPosition: bottom
  transitivelyLinkDependencies: false
settings:
  CODE_SIGN_STYLE: Automatic
  DEVELOPMENT_TEAM: QVYZN4MJ67

targets:
  Spitfire:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    scheme:
      testTargets:
        - SpitfireTests
    sources:
      - path: Spitfire
        excludes:
          - "LaunchScreen.storyboard"
      - path: Spitfire/LaunchScreen.storyboard
        buildPhase: resources
    info:
      path: Spitfire/Info.plist
      properties:
        CFBundleDisplayName: Spitfire
        CFBundleShortVersionString: "0.1"
        CFBundleVersion: "1"
        ITSAppUsesNonExemptEncryption: false
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            taile85139.ts.net:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: true
        NSLocalNetworkUsageDescription: "Spitfire connects to your Ollama server, which may live on your local network or a Tailscale tailnet."
    entitlements:
      path: Spitfire/Spitfire.entitlements
    settings:
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      CURRENT_PROJECT_VERSION: "1"
      MARKETING_VERSION: "0.1"
      PRODUCT_BUNDLE_IDENTIFIER: dev.prasta1.Spitfire
      PRODUCT_NAME: $(TARGET_NAME)
      SWIFT_VERSION: "5.9"
      TARGETED_DEVICE_FAMILY: "1,2"

  Spitfire-macOS:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    scheme:
      testTargets:
        - SpitfireTests-macOS
    sources:
      - path: Spitfire
        excludes:
          - "LaunchScreen.storyboard"
    info:
      path: Spitfire/Info.plist
      properties:
        CFBundleDisplayName: Spitfire
        CFBundleShortVersionString: "0.1"
        CFBundleVersion: "1"
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            taile85139.ts.net:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: true
        NSLocalNetworkUsageDescription: "Spitfire connects to your Ollama server, which may live on your local network or a Tailscale tailnet."
    entitlements:
      path: Spitfire/Spitfire-macOS.entitlements
    settings:
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      CURRENT_PROJECT_VERSION: "1"
      MARKETING_VERSION: "0.1"
      PRODUCT_BUNDLE_IDENTIFIER: dev.prasta1.Spitfire-macOS
      PRODUCT_NAME: Spitfire
      SWIFT_VERSION: "5.9"

  SpitfireTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SpitfireTests
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: dev.prasta1.SpitfireTests
      SWIFT_VERSION: "5.9"
    dependencies:
      - target: Spitfire

  SpitfireTests-macOS:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: SpitfireTests
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: dev.prasta1.SpitfireTests-macOS
      SWIFT_VERSION: "5.9"
    dependencies:
      - target: Spitfire-macOS
